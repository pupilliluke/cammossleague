# Production Configuration
# All secrets come from environment variables — never commit real values here.
# On Railway, reference the Postgres add-on's DATABASE_URL / PGUSER / PGPASSWORD
# (Variables tab -> "Add reference variable").

# Database — DATABASE_URL must be a JDBC URL, e.g.
#   jdbc:postgresql://host:5432/dbname
# If your provider requires SSL (Neon, Supabase), append ?sslmode=require to the URL.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA — Flyway owns versioned migrations; Hibernate fills in any drift between
# the migrations and the entity model on boot. Switch to `validate` once the
# schema is stable and all migrations cover every entity column.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Flyway — migrations run on first boot against an empty Railway DB.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

# CORS — same-origin in prod (SPA bundled into the JAR), so this list is only
# needed if you serve the frontend from a different domain. Leave empty otherwise.
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Logging
logging.level.org.springframework.security=INFO
logging.level.cammossleague=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Server — Railway injects $PORT
server.port=${PORT:8080}
server.address=0.0.0.0
server.shutdown=graceful
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Google OAuth — set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET in Railway Variables.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
